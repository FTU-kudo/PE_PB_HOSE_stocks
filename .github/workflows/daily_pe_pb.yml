name: 📊 Daily P/E & P/B Update

on:
  schedule:
    - cron: '5 9 * * 1-5'   # 09:05 UTC = 16:05 ICT, Mon–Fri
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even outside market days'
        required: false
        default: 'false'

jobs:
  daily-update:
    name: Fetch close prices & compute PE/PB
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      # ── Diagnostics ──────────────────────────────────────────────────────────
      - name: Diagnose environment
        run: |
          echo "=== Python & vnstock ==="
          python --version
          pip show vnstock | grep -E "Name|Version" || echo "vnstock not installed"

          echo "=== vnstock imports ==="
          python -c "
          for cls in ['Reference', 'Finance', 'Trading']:
              try:
                  exec(f'from vnstock import {cls}; print(f\"  {cls} OK\")')
              except Exception as e:
                  print(f'  {cls} FAILED: {e}')
          "

          echo "=== Check fundamentals cache ==="
          if [ -f data/fundamentals.parquet ]; then
            python -c "
          import pandas as pd, os, datetime
          df = pd.read_parquet('data/fundamentals.parquet')
          mtime = datetime.date.fromtimestamp(os.path.getmtime('data/fundamentals.parquet'))
          print(f'  {len(df)} tickers | cache date: {mtime}')
          print(f'  EPS valid: {df[\"eps_annual\"].notna().sum()} | BVPS valid: {df[\"bvps\"].notna().sum()}')
          "
          else
            echo "  ⚠️ data/fundamentals.parquet not found — will auto-fetch fundamentals in next step."
          fi

      # ── Self-healing fallback: ensure fundamentals exist ─────────────────────
      - name: Ensure fundamentals cache exists
        env:
          VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
        run: |
          if [ ! -f data/fundamentals.parquet ]; then
            echo "Fundamentals cache missing. Auto-running weekly fundamentals fetch..."
            python scripts/fetch_fundamentals.py
          fi

      # ── Main scripts ─────────────────────────────────────────────────────────
      - name: Compute daily PE/PB
        env:
          VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
        run: python scripts/daily_compute.py

      - name: Build GitHub Pages dashboard
        run: python scripts/build_dashboard.py

      # ── Commit & push ─────────────────────────────────────────────────────────
      - name: Commit and push data + dashboard
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/ docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u '+%Y-%m-%d')
            git commit -m "📊 P/E P/B daily update ${DATE} [skip ci]"
            # Pull-rebase + push with up to 3 retries to handle concurrent remote pushes
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              echo "Push attempt $i failed. Waiting 10s before retry..."
              sleep 10
            done
          fi

      # ── Job summary ───────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          echo "### 📊 Daily P/E & P/B — ${DATE}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "data/daily/pe_pb_${DATE}.csv" ]; then
            ROWS=$(wc -l < "data/daily/pe_pb_${DATE}.csv")
            echo "✅ Snapshot: \`data/daily/pe_pb_${DATE}.csv\` (${ROWS} rows)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No snapshot found for ${DATE}" >> $GITHUB_STEP_SUMMARY
          fi

