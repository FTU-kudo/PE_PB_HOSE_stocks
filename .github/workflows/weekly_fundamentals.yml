name: 🔄 Weekly Fundamentals Refresh

# Why weekly and not daily?
# Finance.ratio(period='year') returns quarterly/annual data — companies
# only file new reports every 3 months. Refreshing weekly ensures we catch
# earnings season updates (Q4 in Jan–Feb, Q1 in Apr–May, etc.) without
# hammering the API with 400 calls every day.
#
# Runtime estimate: ~400 tickers × 1.2 s sleep = ~8–10 minutes.

on:
  schedule:
    # Every Sunday at 01:00 UTC (quiet period, well before Monday open)
    - cron: '0 1 * * 0'
  workflow_dispatch:       # manual trigger (first run, quarterly forced refresh)
    inputs:
      reason:
        description: 'Reason for manual trigger (optional)'
        required: false
        default: 'Manual refresh'

jobs:
  refresh-fundamentals:
    name: Fetch EPS & BVPS for all HOSE tickers
    runs-on: ubuntu-latest
    timeout-minutes: 60    # safety cap — should complete in ~15 min

    permissions:
      contents: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Python env ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      # ── 3. Run fundamentals fetch ──────────────────────────────────────────
      - name: Fetch Finance.ratio() for all HOSE tickers
        env:
          VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
        run: python scripts/fetch_fundamentals.py

      # ── 4. Commit & push ──────────────────────────────────────────────────
      - name: Commit and push fundamentals cache
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"

          git add data/fundamentals.parquet

          if git diff --staged --quiet; then
            echo "No changes in fundamentals (all EPS/BVPS values identical)."
          else
            DATE=$(date -u '+%Y-%m-%d')
            COUNT=$(python -c "import pandas as pd; df=pd.read_parquet('data/fundamentals.parquet'); print(len(df))")
            git commit -m "🔄 Weekly fundamentals refresh ${DATE} (${COUNT} tickers) [skip ci]"
            git push
          fi

      # ── 5. Summary ────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          echo "### 🔄 Weekly Fundamentals — ${DATE}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/fundamentals.parquet ]; then
            python - << 'EOF' >> $GITHUB_STEP_SUMMARY
import pandas as pd
df = pd.read_parquet('data/fundamentals.parquet')
valid_eps  = df['eps_annual'].notna().sum()
valid_bvps = df['bvps'].notna().sum()
total      = len(df)
print(f"| Metric | Value |")
print(f"|--------|-------|")
print(f"| Total tickers | {total} |")
print(f"| Valid EPS  | {valid_eps} ({valid_eps/total*100:.0f}%) |")
print(f"| Valid BVPS | {valid_bvps} ({valid_bvps/total*100:.0f}%) |")
EOF
          else
            echo "⚠️ data/fundamentals.parquet not found after fetch." >> $GITHUB_STEP_SUMMARY
          fi
