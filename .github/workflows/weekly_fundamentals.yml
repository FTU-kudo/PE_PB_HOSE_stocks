name: 🔄 Weekly Fundamentals Refresh

on:
  schedule:
    - cron: '0 1 * * 0'   # Every Sunday 01:00 UTC
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger (optional)'
        required: false
        default: 'Manual refresh'

jobs:
  refresh-fundamentals:
    name: Fetch EPS & BVPS for all HOSE tickers
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      # ── Diagnostics (runs before main script so errors are visible) ─────────
      - name: Diagnose environment
        run: |
          echo "=== Python version ==="
          python --version

          echo "=== vnstock version ==="
          pip show vnstock | grep -E "Name|Version|Location" || echo "vnstock not found!"

          echo "=== Test vnstock top-level imports ==="
          python -c "
          for cls in ['Reference', 'Finance', 'Trading']:
              try:
                  exec(f'from vnstock import {cls}; print(f\"  {cls} OK\")')
              except Exception as e:
                  print(f'  {cls} FAILED: {e}')
          "

          echo "=== Test scripts.config import ==="
          python -c "
          import sys, os
          sys.path.insert(0, os.getcwd())
          from scripts.config import EXCHANGE, VINGROUP_TICKERS
          print(f'  config OK — EXCHANGE={EXCHANGE}, VINGROUP={VINGROUP_TICKERS}')
          " || echo "  scripts.config import FAILED"

          echo "=== Workspace files ==="
          find . -not -path './.git/*' -type f | sort

      # ── Main script ─────────────────────────────────────────────────────────
      - name: Fetch Finance.ratio() for all HOSE tickers
        env:
          VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
        run: python scripts/fetch_fundamentals.py

      # ── Commit results ───────────────────────────────────────────────────────
      - name: Commit and push fundamentals cache
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/fundamentals.parquet
          if git diff --staged --quiet; then
            echo "No changes in fundamentals."
          else
            DATE=$(date -u '+%Y-%m-%d')
            COUNT=$(python -c "import pandas as pd; df=pd.read_parquet('data/fundamentals.parquet'); print(len(df))")
            git commit -m "\U0001f504 Weekly fundamentals refresh ${DATE} (${COUNT} tickers) [skip ci]"
            # Pull-rebase + push with up to 3 retries to handle concurrent remote pushes
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              echo "Push attempt $i failed. Waiting 10s before retry..."
              sleep 10
            done
          fi

      # ── Job summary ──────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          echo "### 🔄 Weekly Fundamentals — ${DATE}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/fundamentals.parquet ]; then
            python -c "
          import pandas as pd
          df = pd.read_parquet('data/fundamentals.parquet')
          valid_eps  = df['eps_ttm'].notna().sum()
          valid_bvps = df['bvps'].notna().sum()
          total      = len(df)
          print(f'| Metric | Value |')
          print(f'|--------|-------|')
          print(f'| Total tickers | {total} |')
          print(f'| Valid EPS  | {valid_eps} ({valid_eps/total*100:.0f}%) |')
          print(f'| Valid BVPS | {valid_bvps} ({valid_bvps/total*100:.0f}%) |')
          " >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ data/fundamentals.parquet not found after fetch." >> $GITHUB_STEP_SUMMARY
          fi
